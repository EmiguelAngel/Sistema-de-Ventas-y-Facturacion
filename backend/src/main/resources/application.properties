# Configuración PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/Sistema de ventas
spring.datasource.username=postgres
spring.datasource.password=123456789
spring.datasource.driver-class-name=org.postgresql.Driver
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
management.security.enabled=false

# Configuración JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Puerto del servidor
server.port=8080

# Configuración MercadoPago
spring.config.import=classpath:mercadopago.properties

# Configuración FACTUS — Facturación Electrónica DIAN
# Reemplazar los valores con credenciales reales de factus.com.co
factus.api.url=https://api-sandbox.factus.com.co
factus.client.id=REPLACE_WITH_CLIENT_ID
factus.client.secret=REPLACE_WITH_CLIENT_SECRET
factus.numbering.range.id=1
